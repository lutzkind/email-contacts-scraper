<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Email Contacts Scraper Login</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 420px; margin: 60px auto; padding: 0 16px; }
      form { display: grid; gap: 12px; }
      input, button { padding: 10px 12px; font: inherit; }
      .error { color: #b91c1c; }
    </style>
  </head>
  <body>
    <h1>Email Contacts Scraper</h1>
    <p>Sign in to create email scraping jobs.</p>
    <form id="login-form">
      <input id="username" placeholder="Username" required>
      <input id="password" type="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
    <p id="message" class="error"></p>
    <script>
      document.getElementById("login-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const message = document.getElementById("message");
        message.textContent = "";
        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
          }),
        });
        const payload = await response.json();
        if (!response.ok) {
          message.textContent = payload.error || "Login failed.";
          return;
        }
        location.href = "/dashboard";
      });
    </script>
  </body>
</html>
